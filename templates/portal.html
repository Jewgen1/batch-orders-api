<!DOCTYPE html>
<html>
<head>
    <title>Batch Operations Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 16px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
            margin: 2px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            text-align: left;
            background: #f5f5f5;
        }
    </style>
</head>
<body>
    <h1>Batch Operations Portal</h1>

    <div class="card">
        <h2>Metadata</h2>
        <div id="meta">Loading...</div>
    </div>

    <div class="card">
        <h2>Orders</h2>
        <button onclick="createTestOrder()">Generate test order</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Order Number</th>
                    <th>Status</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="orders-table-body">
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Events</h2>
        <button onclick="createTestEvent()">Generate test event</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Event Type</th>
                    <th>Message</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody id="events-table-body">
            </tbody>
        </table>
    </div>

    <script src="/static/app.js?v=052"></script>
</body>
</html>
